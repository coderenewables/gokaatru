# Docker Compose configuration for LibreChat talking to the GoKaatru SSE server.
# If LibreChat runs outside Docker, change the URL to http://localhost:8080/sse.
version: "1.3.6"

mcpSettings:
  allowedDomains:
    - http://gokaatru:8080
    - http://localhost:8080

mcpServers:
  gokaatru:
    type: sse
    url: http://gokaatru:8080/sse
    timeout: 120000
