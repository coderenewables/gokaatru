services:
  gokaatru:
    build: .
    ports:
      - "8080:8080"
    environment:
      - EARTHDATAHUB_TOKEN=${EARTHDATAHUB_TOKEN:-}
    volumes:
      - ./data:/app/data

  librechat:
    image: ghcr.io/danny-avila/librechat:latest
    ports:
      - "3080:3080"
    volumes:
      - ./librechat_config.yaml:/app/librechat.yaml:ro
    depends_on:
      - gokaatru
