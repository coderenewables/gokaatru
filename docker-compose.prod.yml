services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m uvicorn server.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: python -m server.main --transport sse --host 0.0.0.0 --port 8080
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - api
      - mcp
    env_file:
      - .env.production
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
